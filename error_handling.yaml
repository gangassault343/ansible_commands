---
- hosts:  all
  become: true

  tasks:
    - name: Un-Install Nginx
      apt:
        name: nginx
        state: absent
    - name: Check if apache2 in installed
      apt:
        name: apache2
        state: latest
        update_cache: yes
      register: output
      ignore_errors: yes
    - name: get the outputs
      debug:
        var: output
    - name: Start apache server
      service:
        name: apache2
        state: started
        enabled: yes
    - name: un-install apache after update
      apt:
        name: apache2
        state: absent
      when: output.changed == true
